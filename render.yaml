# Render Blueprint for MonoLit
# Deploy with: https://render.com/deploy?repo=<your-github-repo-url>
services:
  - type: web
    name: monolit
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: MONOLIT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false  # paste your Neon Postgres connection string here in the dashboard
