<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <defs>
    <pattern id="grid" width="4" height="4" patternUnits="userSpaceOnUse">
      <path d="M4 0H0V4" fill="none" stroke="#1f4d8a" stroke-width="0.5" opacity="0.5"/>
    </pattern>
  </defs>
  <!-- Blueprint paper -->
  <rect x="2" y="2" width="60" height="60" fill="#0e2a52"/>
  <rect x="2" y="2" width="60" height="60" fill="url(#grid)"/>
  <!-- Frame -->
  <rect x="2" y="2" width="60" height="60" fill="none" stroke="#7fb3ff" stroke-width="1"/>
  <!-- Folded corner -->
  <polygon points="52,2 62,2 62,12" fill="#143b73"/>
  <polyline points="52,2 52,12 62,12" fill="none" stroke="#7fb3ff" stroke-width="1"/>
  <!-- Minecraft block silhouette (gray stone-ish) -->
  <g transform="translate(14,14)">
    <!-- top face -->
    <polygon points="18,0 36,8 18,16 0,8" fill="#9a9a9a" stroke="#cfcfcf" stroke-width="0.5"/>
    <!-- left face -->
    <polygon points="0,8 18,16 18,36 0,28" fill="#6e6e6e" stroke="#cfcfcf" stroke-width="0.5"/>
    <!-- right face -->
    <polygon points="36,8 18,16 18,36 36,28" fill="#828282" stroke="#cfcfcf" stroke-width="0.5"/>
    <!-- pixel speckles on faces -->
    <rect x="3" y="14" width="2" height="2" fill="#5a5a5a"/>
    <rect x="9" y="20" width="2" height="2" fill="#5a5a5a"/>
    <rect x="13" y="29" width="2" height="2" fill="#888"/>
    <rect x="22" y="18" width="2" height="2" fill="#666"/>
    <rect x="28" y="24" width="2" height="2" fill="#9a9a9a"/>
    <rect x="22" y="30" width="2" height="2" fill="#777"/>
    <rect x="6" y="6" width="2" height="2" fill="#bbb"/>
    <rect x="22" y="6" width="2" height="2" fill="#bbb"/>
    <rect x="14" y="2" width="2" height="2" fill="#bbb"/>
  </g>
  <!-- Measurement marks -->
  <g stroke="#7fb3ff" stroke-width="0.6" fill="none">
    <line x1="6" y1="55" x2="14" y2="55"/>
    <line x1="6" y1="53" x2="6" y2="57"/>
    <line x1="14" y1="53" x2="14" y2="57"/>
    <line x1="50" y1="55" x2="58" y2="55"/>
    <line x1="50" y1="53" x2="50" y2="57"/>
    <line x1="58" y1="53" x2="58" y2="57"/>
  </g>
</svg>
